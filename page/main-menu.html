  <div class="main-menu-center">
    <h1 class="main-menu-title">Hungry Shark</h1>
    <canvas id="menu-shark-canvas" width="240" height="140" aria-hidden="true"></canvas>
  </div>

  <footer class="main-menu-footer">
    <button
      id="shark-shop-btn"
      type="button"
      class="main-menu-icon-btn main-menu-action-btn"
      aria-label="Sharks"
    >
      🦈
    </button>
    <button id="how-to-play-btn" type="button" class="main-menu-text-btn">
      How to play?
    </button>
    <button
      id="play-btn"
      type="button"
      class="main-menu-icon-btn main-menu-action-btn main-menu-play-btn"
      aria-label="Play"
    >
