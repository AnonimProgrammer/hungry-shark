<div id="settings-menu" class="screen-overlay hidden">
  <div class="screen-panel">
    <h1 class="screen-title">Paused</h1>
    <p class="screen-subtitle">Take a breather — the ocean can wait.</p>
    <div class="screen-actions">
      <button id="settings-resume-btn" type="button" class="screen-btn">
        ▶ Resume
      </button>
      <button id="settings-quit-btn" type="button" class="screen-btn screen-btn-secondary">
        ⎋ Quit to menu
      </button>
      <button id="settings-music-btn" type="button" class="screen-btn screen-btn-secondary">
        ♪ Turn off music
      </button>
    </div>
  </div>
</div>
