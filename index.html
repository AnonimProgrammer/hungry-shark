<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hungry Shark</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main id="game-container">
      <canvas id="game-canvas"></canvas>

      <div id="start-screen" class="screen-overlay">
        <div class="screen-panel">
          <h1 class="screen-title">Hungry Shark</h1>
          <p class="screen-subtitle">Swim, hunt, survive.</p>
          <p id="start-high-score" class="screen-high-score">Best: 0s</p>
          <ul class="screen-instructions">
            <li>Move mouse to aim · Hold LMB to swim</li>
            <li>Eat orange fish to restore HP and reset hunger</li>
            <li>Avoid the bomb — starvation hits after 5s without food</li>
          </ul>
          <button id="start-btn" type="button" class="screen-btn">Start Game</button>
        </div>
      </div>

      <div id="game-over-screen" class="screen-overlay hidden">
        <div class="screen-panel">
          <h1 class="screen-title">Game Over</h1>
          <p id="final-score" class="screen-score">Survived 0 seconds</p>
          <p id="game-over-high-score" class="screen-high-score">Best: 0s</p>
          <p class="screen-subtitle">Your run has ended.</p>
          <button id="restart-btn" type="button" class="screen-btn">Play Again</button>
        </div>
      </div>
    </main>
    <script type="module" src="src/index.js"></script>
  </body>
</html>
