<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hungry Shark</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/screens.css" />
    <link rel="stylesheet" href="css/main-menu.css" />
  </head>
  <body>
    <main id="game-container">
      <canvas id="game-canvas"></canvas>

      <div id="game-over-screen" class="screen-overlay hidden">
        <div class="screen-panel">
          <h1 class="screen-title">Game Over</h1>
          <p id="final-score" class="screen-score">Score: 0</p>
          <p id="game-over-high-score" class="screen-high-score">Best: 0</p>
          <p class="screen-subtitle">Your run has ended.</p>
          <button id="restart-btn" type="button" class="screen-btn">Play Again</button>
        </div>
      </div>
    </main>
    <script type="module" src="src/index.js"></script>
  </body>
</html>
